name: Build & Publish Documents

# Builds the strategy papers from their Markdown sources into DOCX, PDF, and HTML.
# Because binary artefacts (DOCX/PDF) cannot be committed through the automation API,
# this workflow publishes every format as a downloadable build artefact on each push,
# and attaches them to a GitHub Release when a vX.Y.Z tag is pushed.

on:
  push:
    branches: ["**"]
    paths:
      - "Doc/**/*.md"
      - "Scripts/build_govtech_docs.py"
      - "requirements.txt"
      - ".github/workflows/build-docs.yml"
  create:            # tag creation
  workflow_dispatch:  # manual run from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pandoc and WeasyPrint system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc libpango-1.0-0 libpangocairo-1.0-0 \
            libgdk-pixbuf2.0-0 libcairo2 libffi-dev fonts-dejavu

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Validate citations
        run: python3 Scripts/validate_citations.py

      - name: Check EN/DE translation parity
        run: python3 Scripts/translate_document.py --check

      - name: Build DOCX / PDF / HTML for every language
        run: python3 Scripts/build_govtech_docs.py

      - name: List built artefacts
        run: find Doc/build -type f -printf '%s\t%p\n' | sort -k2

      - name: Upload rendered documents (DOCX/PDF/HTML)
        uses: actions/upload-artifact@v4
        with:
          name: govtech-strategy-${{ github.sha }}
          path: Doc/build/**
          if-no-files-found: error

      - name: Attach rendered documents to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Doc/build/en/*
            Doc/build/de/*
